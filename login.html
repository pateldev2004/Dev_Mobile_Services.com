{% extends "base.html" %}

{% block title %}Login - DEV Mobile & Services{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">
                        <i class="fas fa-sign-in-alt text-primary"></i> Login
                    </h2>
                    
                    <form method="POST" id="loginForm">
                        <div class="mb-3">
                            <label for="username_or_email" class="form-label">Email or Username</label>
                            <input type="text" class="form-control" id="username_or_email" name="username_or_email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block w-100">Login</button>
                    </form>
                    
                    <hr>
                    
                    <p class="text-center text-muted">Don't have an account?</p>
                    <a href="/auth/register" class="btn btn-outline-primary btn-block w-100">
                        Create Account
                    </a>
                    
                    <p class="text-center mt-3">
                        <a href="#" class="text-decoration-none">Forgot Password?</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    fetch('/auth/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            username_or_email: document.getElementById('username_or_email').value,
            password: document.getElementById('password').value
        })
    })
    .then(response => response.json())
    .then(data => {
        if (response.ok) {
            window.location.href = data.redirect || '/';
        } else {
            showAlert(data.error, 'error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showAlert('Login failed. Please try again.', 'error');
    });
});
</script>
{% endblock %}
